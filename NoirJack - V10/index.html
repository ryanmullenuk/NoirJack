<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NoirJack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="splashScreen" class="splash-screen">
    <div class="splash-inner">
      <img src="assets/noirjack-logo-wide.png" alt="NoirJack" class="splash-logo" />
      <p class="splash-tagline">Simple. Refined. Play.</p>
      <button id="playBtn" class="play-btn">Play</button>
    </div>
  </section>

  <main id="gameApp" class="app app-hidden">
    <section class="top-bar">
      <button id="menuBtn" class="menu-btn" aria-label="Open settings">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="brand">
        <img src="assets/noirjack-logo-wide.png" alt="NoirJack" class="logo" />
        <p class="eyebrow brand-tagline">Simple. Refined. Play.</p>
      </div>

      <div class="bank">
        <span>Bank</span>
        <strong id="bank">£100</strong>
      </div>
    </section>

    <section id="table" class="table">
      <div class="row">
        <div>
          <p class="label">Dealer</p>
          <h2 id="dealerScore">0</h2>
        </div>
        <div id="dealerCards" class="cards"></div>
      </div>

      <div id="message" class="message">Place your bet to start.</div>

      <div class="row player-row">
        <div>
          <p class="label">You</p>
          <h2 id="playerScore">0</h2>
        </div>
        <div id="playerCards" class="cards"></div>
      </div>
    </section>

    <section class="controls">
      <div class="bet-panel">
        <button id="minusBet" class="round">−</button>
        <div>
          <p class="label">Bet</p>
          <strong id="bet">£1</strong>
        </div>
        <button id="plusBet" class="round">+</button>
      </div>

      <button id="deal" class="primary">Deal</button>

      <div class="actions">
        <button id="hit" disabled>Hit</button>
        <button id="stay" disabled>Stay</button>
        <button id="hint" disabled>Hint</button>
      </div>
    </section>
  </main>

  <div id="settingsOverlay" class="settings-overlay" hidden></div>

  <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
    <div class="settings-header">
      <div>
        <p class="eyebrow">Settings</p>
        <h3>Game Options</h3>
      </div>
      <button id="closeSettings" class="close-btn" aria-label="Close settings">×</button>
    </div>

    <div class="setting-row">
      <div>
        <strong>Sounds</strong>
        <p>Win and lose tones</p>
      </div>
      <button id="soundToggle" class="toggle is-on">On</button>
    </div>

    <div class="setting-block">
      <strong>Currency</strong>
      <div class="currency-grid">
        <button class="currency-option is-selected" data-symbol="£" data-label="Pound">£ Pound</button>
        <button class="currency-option" data-symbol="$" data-label="Dollar">$ Dollar</button>
        <button class="currency-option" data-symbol="€" data-label="Euro">€ Euro</button>
      </div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
